name: Erlang CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build:
    name: "build (OTP ${{ matrix.otp }})"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    strategy:
      matrix:
        otp: ['28', '29']
    container:
      image: erlang:${{ matrix.otp }}
    steps:
    - uses: actions/checkout@v4
    - run: make build

  verify:
    name: "verify: ${{ matrix.check.name }} (OTP ${{ matrix.otp }})"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:${{ matrix.otp }}
    strategy:
      matrix:
        otp: ['28', '29']
        check:
          - name: dialyzer
            cmd: rebar3 as test dialyzer
          - name: erlang_types
            cmd: ./typecheck_erlang_types
          - name: syntax transformation
            cmd: ./_build/default/bin/etylizer --sanity --no-type-checking -I ./include -I ./src ./src/*.erl
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - run: ${{ matrix.check.cmd }}

  metrics:
    name: "metrics: ${{ matrix.name }} (OTP 29)"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: erlang:29
    strategy:
      matrix:
        include:
          - name: etylizer
            cmd: .github/scripts/report_etylizer
          - name: typecheck
            cmd: .github/scripts/report_typecheck
    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        path: pr
    - name: Build PR
      working-directory: pr
      run: make build && rebar3 as metrics escriptize
    - name: Checkout base
      if: github.event_name == 'pull_request'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        path: base
    - name: Build base
      if: github.event_name == 'pull_request'
      working-directory: base
      run: make build && rebar3 as metrics escriptize || true
    # 2x2 matrix: run the suite's corpus through BOTH engines (base & PR) so the
    # comment can isolate the engine effect from the corpus change. A=base, B=PR.
    - name: Run metrics matrix
      if: github.event_name == 'pull_request'
      run: pr/.github/scripts/metrics_matrix.sh run base pr ${{ matrix.name }} matrix_out
    - name: Upload matrix artifact
      if: always() && github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: metrics-${{ matrix.name }}-matrix
        path: matrix_out/
        if-no-files-found: ignore
    # On push (no base to compare) just run the PR report as a smoke check.
    - name: Report PR (push smoke check)
      if: github.event_name != 'pull_request'
      working-directory: pr
      run: ${{ matrix.cmd }}

  test:
    name: "test: ${{ matrix.check.name }} (OTP ${{ matrix.otp }})"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:${{ matrix.otp }}
    strategy:
      matrix:
        otp: ['28', '29']
        check:
          - name: typecheck
            cmd: ./run_test.escript typecheck
          - name: infer
            cmd: ./run_test.escript infer 2>&1 | tee /tmp/test_report.log
            artifact: test-infer-pr
          - name: property-based
            cmd: rebar3 proper
          - name: unit-test tests
            cmd: make testtest
          - name: unit-tests
            cmd: rebar3 eunit
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - run: ${{ matrix.check.cmd }}
    - name: Upload test report
      if: matrix.check.artifact && matrix.otp == '29'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.check.artifact }}
        path: /tmp/test_report.log

  test-base:
    name: "test (base): infer"
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:28
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
    - run: make build
    - run: ./run_test.escript infer 2>&1 | tee /tmp/test_report.log || true
    - uses: actions/upload-artifact@v4
      with:
        name: test-infer-base
        path: /tmp/test_report.log

  ci-stats:
    name: "CI stats"
    needs: [verify, metrics, test, test-base]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: erlang:28
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        path: /tmp/artifacts
    - name: Generate stats
      run: |
        : > /tmp/ci_stats.md
        # POSIX positional params hold the accumulated --suite ... args for
        # the unified partitions report. Container shell is sh, not bash.
        set --
        for suite in etylizer typecheck; do
          case $suite in
            etylizer)     title="etylizer";;
            typecheck)    title="typecheck tests";;
          esac
          dir="/tmp/artifacts/metrics-${suite}-matrix"
          # Engine-effect + diagonal tables straight from the 2x2 matrix cells.
          if [ -d "$dir" ]; then
            .github/scripts/metrics_matrix.sh report "$suite" "$dir" "$title" >> /tmp/ci_stats.md
            echo "" >> /tmp/ci_stats.md
          fi
          # Partitions report runs on the diagonal cells (PR/PR vs base/base).
          pr_file="$dir/${suite}_cB_eB.json"
          base_file="$dir/${suite}_cA_eA.json"
          if [ -f "$pr_file" ]; then
            if [ -f "$base_file" ]; then
              set -- "$@" --suite "$suite" "$pr_file" "$base_file"
            else
              set -- "$@" --suite "$suite" "$pr_file"
            fi
          fi
        done
        if [ "$#" -gt 0 ]; then
          .github/scripts/ety_partitions_report "$@" >> /tmp/ci_stats.md
        fi
        echo "## Test Statistics: infer" >> /tmp/ci_stats.md
        echo "" >> /tmp/ci_stats.md
        .github/scripts/typecheck_stats.sh \
          /tmp/artifacts/test-infer-pr/test_report.log \
          /tmp/artifacts/test-infer-base/test_report.log \
          >> /tmp/ci_stats.md
    - name: Post stats to PR
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const statsFile = '/tmp/ci_stats.md';
          if (!fs.existsSync(statsFile)) return;
          const body = fs.readFileSync(statsFile, 'utf8');
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('Typecheck Statistics')
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

  case-study:
    name: "case study: ${{ matrix.study.name }} (OTP ${{ matrix.otp }})"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:${{ matrix.otp }}
    strategy:
      matrix:
        otp: ['28', '29']
        study:
          - name: stdlib
            cmd: test_files/etylizer-mini/check-stdlib.sh
          - name: jsone
            cmd: test_files/etylizer-mini/check-jsone.sh
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - run: ETYLIZER_CASE_STUDY_LOGLEVEL=warn ${{ matrix.study.cmd }}
