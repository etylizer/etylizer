name: Erlang CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    container:
      image: erlang:28
    steps:
    - uses: actions/checkout@v4
    - run: make build

  verify:
    name: "verify: ${{ matrix.name }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:28
    strategy:
      matrix:
        include:
          - name: dialyzer
            cmd: rebar3 as test dialyzer
          - name: erlang_types
            cmd: ./typecheck_erlang_types --report-mode report --report-timeout 30000
          - name: syntax transformation
            cmd: ./_build/default/bin/etylizer --sanity --no-type-checking -I ./include -I ./src ./src/*.erl
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - run: ${{ matrix.cmd }}

  metrics:
    name: "metrics: ${{ matrix.name }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: erlang:28
    strategy:
      matrix:
        include:
          - name: erlang_types
            cmd: ./report_erlang_types
            json: erlang_types_metrics.json
            artifact_pr: metrics-erlang-types-pr
            artifact_base: metrics-erlang-types-base
          - name: etylizer
            cmd: ./report_etylizer
            json: etylizer_metrics.json
            artifact_pr: metrics-etylizer-pr
            artifact_base: metrics-etylizer-base
          - name: typecheck
            cmd: ./report_typecheck
            json: typecheck_test_metrics.json
            artifact_pr: metrics-typecheck-pr
            artifact_base: metrics-typecheck-base
    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        path: pr
    - name: Build PR
      working-directory: pr
      run: make build && rebar3 as metrics escriptize
    - name: Report PR
      working-directory: pr
      run: ${{ matrix.cmd }}
    - name: Upload PR artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_pr }}
        path: pr/${{ matrix.json }}
    - name: Checkout base
      if: github.event_name == 'pull_request'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        path: base
    - name: Build base
      if: github.event_name == 'pull_request'
      working-directory: base
      run: make build && rebar3 as metrics escriptize || true
    - name: Report base
      if: github.event_name == 'pull_request'
      working-directory: base
      run: ${{ matrix.cmd }} || true
    - name: Upload base artifact
      if: always() && github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_base }}
        path: base/${{ matrix.json }}
        if-no-files-found: ignore

  test:
    name: "test: ${{ matrix.name }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:28
    strategy:
      matrix:
        include:
          - name: typecheck
            cmd: ./run_test.escript typecheck
          - name: infer
            cmd: ./run_test.escript infer 2>&1 | tee /tmp/test_report.log
            artifact: test-infer-pr
          - name: property-based
            cmd: rebar3 proper
          - name: unit-test tests
            cmd: make testtest
          - name: unit-tests
            cmd: rebar3 eunit
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - run: ${{ matrix.cmd }}
    - name: Upload test report
      if: matrix.artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: /tmp/test_report.log

  test-base:
    name: "test (base): infer"
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:28
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
    - run: make build
    - run: ./run_test.escript infer 2>&1 | tee /tmp/test_report.log || true
    - uses: actions/upload-artifact@v4
      with:
        name: test-infer-base
        path: /tmp/test_report.log

  ci-stats:
    name: "CI stats"
    needs: [verify, metrics, test, test-base]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: erlang:28
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        path: /tmp/artifacts
    - name: Generate stats
      run: |
        : > /tmp/ci_stats.md
        # POSIX positional params hold the accumulated --suite ... args for
        # the unified partitions report. Container shell is sh, not bash.
        set --
        for suite in erlang_types etylizer typecheck; do
          case $suite in
            erlang_types) title="erlang_types"; json="erlang_types_metrics.json"; artifact="metrics-erlang-types";;
            etylizer)     title="etylizer";     json="etylizer_metrics.json";      artifact="metrics-etylizer";;
            typecheck)    title="typecheck tests"; json="typecheck_test_metrics.json"; artifact="metrics-typecheck";;
          esac
          pr_file="/tmp/artifacts/${artifact}-pr/${json}"
          base_file="/tmp/artifacts/${artifact}-base/${json}"
          if [ -f "$pr_file" ]; then
            if [ -f "$base_file" ]; then
              ./ety_metrics_report --title "$title" "$pr_file" "$base_file" >> /tmp/ci_stats.md
              set -- "$@" --suite "$suite" "$pr_file" "$base_file"
            else
              ./ety_metrics_report --title "$title" "$pr_file" >> /tmp/ci_stats.md
              set -- "$@" --suite "$suite" "$pr_file"
            fi
            echo "" >> /tmp/ci_stats.md
          fi
        done
        if [ "$#" -gt 0 ]; then
          ./ety_partitions_report "$@" >> /tmp/ci_stats.md
        fi
        echo "## Test Statistics: infer" >> /tmp/ci_stats.md
        echo "" >> /tmp/ci_stats.md
        .github/scripts/typecheck_stats.sh \
          /tmp/artifacts/test-infer-pr/test_report.log \
          /tmp/artifacts/test-infer-base/test_report.log \
          >> /tmp/ci_stats.md
    - name: Post stats to PR
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const statsFile = '/tmp/ci_stats.md';
          if (!fs.existsSync(statsFile)) return;
          const body = fs.readFileSync(statsFile, 'utf8');
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('Typecheck Statistics')
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

  case-study:
    name: "case study: ${{ matrix.name }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:28
    strategy:
      matrix:
        include:
          - name: stdlib
            cmd: test_files/etylizer-mini/check-stdlib.sh
          - name: jsone
            cmd: test_files/etylizer-mini/check-jsone.sh
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - name: Cache espresso binary
      run: ./run_test.escript "case_01 (typecheck)"
    - run: ETYLIZER_CASE_STUDY_LOGLEVEL=warn ${{ matrix.cmd }}
