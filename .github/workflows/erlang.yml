name: Erlang CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    container:
      image: erlang:28
    steps:
    - uses: actions/checkout@v4
    - run: make build

  verify:
    name: "verify: ${{ matrix.name }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:28
    strategy:
      matrix:
        include:
          - name: dialyzer
            cmd: rebar3 as test dialyzer
          - name: typecheck
            cmd: ./typecheck_erlang_types
          - name: syntax transformation
            cmd: ./_build/default/bin/etylizer --sanity --no-type-checking -I ./include -I ./src ./src/*.erl
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - run: ${{ matrix.cmd }}

  test:
    name: "test: ${{ matrix.name }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:28
    strategy:
      matrix:
        include:
          - name: typecheck
            cmd: ./run_test.escript typecheck
          - name: infer
            cmd: ./run_test.escript infer
          - name: property-based
            cmd: rebar3 proper
          - name: unit-test tests
            cmd: make testtest
          - name: unit-tests
            cmd: rebar3 eunit
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - run: ${{ matrix.cmd }}

  case-study:
    name: "case study: ${{ matrix.name }}"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: erlang:28
    strategy:
      matrix:
        include:
          - name: stdlib
            cmd: test_files/etylizer-mini/check-stdlib.sh
          - name: jsone
            cmd: test_files/etylizer-mini/check-jsone.sh
          - name: ety
            cmd: test_files/etylizer-mini/check-ety.sh
    steps:
    - uses: actions/checkout@v4
    - run: make build
    - name: Cache espresso binary
      run: ./run_test.escript "case_01 (typecheck)"
    - run: ETYLIZER_CASE_STUDY_LOGLEVEL=warn ${{ matrix.cmd }}
